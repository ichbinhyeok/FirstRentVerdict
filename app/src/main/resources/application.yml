gg:
  jte:
    usePrecompiledTemplates: true
    developmentMode: false
spring:
  application:
    name: FirstRentVerdict
# server:
#   servlet:
#     context-path: /RentVerdict
app:
  base-url: ${APP_BASE_URL:https://movecostinfo.com}
seo:
  sitemap:
    city-limit: 30
    priority-city-slugs: new-york-ny,los-angeles-ca,chicago-il,houston-tx,phoenix-az,philadelphia-pa,san-antonio-tx,san-diego-ca,dallas-tx,austin-tx,miami-fl,seattle-wa,atlanta-ga,denver-co,boston-ma,washington-dc,las-vegas-nv,portland-or,orlando-fl,charlotte-nc,san-francisco-ca,sacramento-ca,raleigh-nc,nashville-tn,columbus-oh,indianapolis-in,kansas-city-mo,minneapolis-mn,salt-lake-city-ut,detroit-mi
    include-credit-good: false
    include-relocation-pairs: false
    moving-pair-origins-per-city: 3
    savings-amounts: 5000
  indexing:
    noindex:
      relocation-pairs: true
      savings-amounts: 3000,10000
